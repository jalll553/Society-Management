<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Society Management - Login</title>
    <!-- Bootstrap CSS CDN -->
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      body {
        background: linear-gradient(135deg, #667eea, #764ba2);
        min-height: 100vh;
        display: flex;
        align-items: center;
        justify-content: center;
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      }
      .login-card {
        background: white;
        padding: 2.5rem;
        border-radius: 12px;
        box-shadow: 0 0 15px rgba(0,0,0,0.2);
        width: 100%;
        max-width: 400px;
      }
      .login-title {
        margin-bottom: 1.5rem;
        font-weight: 700;
        text-align: center;
        color: #4a3c8c;
      }
      .form-check-label {
        user-select: none;
      }
      .error-msg {
        margin-top: 1rem;
        font-weight: 600;
        color: #d9534f;
        text-align: center;
      }
    </style>
</head>
<body>
    <div class="login-card">
      <h2 class="login-title">Society Management Login</h2>
      <form action="/login" method="POST" novalidate>
        <div class="mb-3">
          <label for="email" class="form-label">Email address</label>
          <input
            type="email"
            class="form-control"
            id="email"
            name="email"
            placeholder="Enter your email"
            required
          />
        </div>
        <div class="mb-3">
          <label for="password" class="form-label">Password</label>
          <input
            type="password"
            class="form-control"
            id="password"
            name="password"
            placeholder="Enter your password"
            required
          />
        </div>
        <fieldset class="mb-3">
          <legend class="col-form-label pt-0">Select Role</legend>
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="role"
              id="adminRole"
              value="admin"
              required
            />
            <label class="form-check-label" for="adminRole">Admin</label>
          </div>
          <div class="form-check">
            <input
              class="form-check-input"
              type="radio"
              name="role"
              id="userRole"
              value="user"
              required
            />
            <label class="form-check-label" for="userRole">User</label>
          </div>
        </fieldset>
        <button type="submit" class="btn btn-primary w-100">Login</button>
        {% if error %}
        <div class="error-msg">{{ error }}</div>
        {% endif %}
      </form>
    </div>

    <!-- Bootstrap JS Bundle CDN -->
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"
    ></script>
</body>
</html>
